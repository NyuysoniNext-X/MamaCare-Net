<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – MamaCare Network</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background: linear-gradient(135deg, #f1f5f9, #e2e8f0); min-height:100vh; display:flex; align-items:center;">
<div class="mh-form-card" style="margin:20px auto;">
    <h1 class="mh-form-title">👨‍💼 Admin Login</h1>
    <p class="mh-form-subtitle">Manage users, hospitals, and system settings.</p>

    <div class="mh-input-group">
        <label>Username</label>
        <input type="text" id="username" class="mh-input" placeholder="Enter username">
    </div>

    <div class="mh-input-group">
        <label>Password</label>
        <input type="password" id="password" class="mh-input" placeholder="Enter password">
    </div>

    <div class="mh-input-group">
        <label>Admin Key</label>
        <input type="text" id="adminKey" class="mh-input" placeholder="Enter security key">
    </div>

    <button onclick="login('admin')" class="mh-btn" style="width:100%; background:#0f172a; color:white; padding:14px; border:none; border-radius:15px; font-weight:600;">Log In</button>

    <div id="error" class="mh-alert mh-alert-error" style="display:none; margin-top:20px;"></div>

</div>

<script src="../js/auth.js"></script>
</body>
</html>
