<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – MamaCare Network</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background: linear-gradient(135deg, #ccfbf1, #e0f2fe); min-height:100vh; display:flex; align-items:center;">
<div class="mh-form-card" style="margin:20px auto;">
  <h1 class="mh-form-title">Create Your Account</h1>
  <p class="mh-form-subtitle">Join MamaCare Network and start your journey with us.</p>

  <div class="mh-input-group">
    <label>Full Name</label>
    <input type="text" id="name" class="mh-input" placeholder="Enter your full name">
  </div>

  <div class="mh-input-group">
    <label>Email Address</label>
    <input type="email" id="email" class="mh-input" placeholder="Enter your email">
  </div>

  <div class="mh-input-group">
    <label>Password</label>
    <input type="password" id="password" class="mh-input" placeholder="Create a password" onkeyup="checkPasswordStrength()">
    <div style="height:5px; background:#e2e8f0; border-radius:5px; margin-top:5px;">
      <div id="strengthBar" style="height:100%; width:0%; border-radius:5px; transition:all 0.3s;"></div>
    </div>
    <p id="strengthText" style="font-size:0.8rem; margin-top:5px;">Choose a strong password</p>
  </div>

  <div class="mh-input-group">
    <label>I am a...</label>
    <select id="role" class="mh-select">
      <option value="">Select your role</option>
      <option value="mother">👩 Expecting Mother</option>
      <option value="nurse">👩‍⚕️ Nurse</option>
      <option value="hospital">🏥 Hospital Staff</option>
      <option value="admin">👨‍💼 Administrator</option>
    </select>
  </div>

  <label style="display:flex; align-items:center; gap:10px; margin:20px 0;">
    <input type="checkbox" id="terms"> I agree to the <a href="../terms-of-service.html">Terms of Service</a> and <a href="../privacy-policy.html">Privacy Policy</a>
  </label>

  <button onclick="signup()" class="mh-btn mh-btn-primary" style="width:100%;">Create Account</button>

  <div style="text-align:center; margin-top:20px;">
    Already have an account? <a href="mother-login.html">Log in</a>
  </div>

  <div id="error" class="mh-alert mh-alert-error" style="display:none; margin-top:20px;"></div>
  <div id="success" class="mh-alert mh-alert-success" style="display:none; margin-top:20px;"></div>
</div>

<script src="../js/auth.js"></script>
<script src="signup.js"></script>
</body>
</html>
